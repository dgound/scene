<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>./SCENE — a data-driven archive</title>
  <meta name="description" content="A graph-based archive of the Greek underground music scene. Bands are nodes; shared members form weighted edges.">
  <meta property="og:title" content="./SCENE — a data-driven archive">
  <meta property="og:description" content="A graph-based archive of the Greek underground music scene.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23222'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='18' font-weight='700' text-anchor='middle' fill='%23fff'%3E./S%3C/text%3E%3C/svg%3E">

  <link rel="stylesheet" href="styles.css" type="text/css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.16.1/vis.css"
        integrity="sha384-oMVixc9NpTIxJ/enK4IWst1ZqEz+zvl9TcItUMKH6ZDjM2i03/P9cmrZXJPNY0eB"
        crossorigin="anonymous">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.16.1/vis-network.min.js"
          integrity="sha384-0uagUa5qHIjLg28xB8BRu0qi8T+YYczbTdkNTkk1I6Sr84y8uNZJYBm2eD0FTEkJ"
          crossorigin="anonymous"></script>

  <style>
    #mynetwork {
      width: 100%;
      height: 750px;
      background-color: #222222;
      border: 1px solid lightgray;
      position: relative;
    }
    #loadingBar {
      position: absolute;
      inset: 0;
      height: 750px;
      background-color: rgba(200, 200, 200, 0.8);
      transition: all 0.5s ease;
      opacity: 1;
    }
    #bar {
      position: absolute;
      top: 0; left: 0;
      width: 20px;
      height: 20px;
      border-radius: 11px;
      border: 2px solid rgba(30, 30, 30, 0.05);
      background: rgb(0, 173, 246);
      box-shadow: 2px 0px 4px rgba(0, 0, 0, 0.4);
    }
    #text {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      color: #000;
    }
    div.outerBorder {
      position: relative;
      top: 400px;
      width: min(600px, 90vw);
      height: 44px;
      margin: 0 auto;
      border: 8px solid rgba(0, 0, 0, 0.1);
      background: linear-gradient(to bottom, #fcfcfc 0%, #ededed 100%);
      border-radius: 72px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    .popup {
      position: absolute;
      top: 0; left: 0;
      display: none;
      background-color: #f5f4ed;
      border-radius: 3px;
      border: 1px solid #808074;
      box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2);
      padding: 8px 10px;
      max-width: 320px;
    }
    .vis-network-tooltip { display: none; }

    .search-bar {
      padding: 16px 24px;
      background: #222;
      color: #fff;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-bar label { font-size: 14px; text-transform: uppercase; }
    .search-bar input {
      flex: 1;
      min-width: 200px;
      padding: 8px 10px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
      font-size: 14px;
    }

    #corner {
      font-size: 12px;
      background: transparent;
      bottom: 0;
      right: 10px;
      position: fixed;
      color: #ffffff;
      max-width: 360px;
    }
    #corner ul { padding: 0 16px; }
  </style>
</head>

<body id="body_graph" data-page="graph">
  <header data-shared></header>

  <main>
    <div class="search-bar">
      <label for="search">Find a band:</label>
      <input id="search" type="text" list="band-list" autocomplete="off" placeholder="Start typing…">
      <datalist id="band-list"></datalist>
    </div>

    <div id="mynetwork" role="application" aria-label="Band collaboration graph"></div>

    <div id="loadingBar" aria-hidden="true">
      <div class="outerBorder">
        <div id="text">0%</div>
        <div id="border">
          <div id="bar"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="corner">
    <ul>
      <button type="button" onclick="document.getElementById('corner').style.display='none'">Hide help</button>
      <li>Use mouse wheel or scroll gestures to zoom in/out.</li>
      <li>Click and drag a node to move it.</li>
      <li>Click on the background and drag to navigate.</li>
      <li>Hover a node to open the info panel.</li>
      <li>Click the band's name to visit their webpage.</li>
      <li>Use the search box above to jump to a band.</li>
    </ul>
  </div>

  <script src="js/header.js"></script>
  <script src="js/graph.js"></script>
</body>
</html>
